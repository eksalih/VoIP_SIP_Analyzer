server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional same-origin API proxy. Not used by default -- the frontend
    # talks directly to VITE_API_URL (baked in at build time). This exists
    # as an alternative for self-hosters who'd rather expose only port 3000
    # publicly and keep the backend's port 8000 internal to the Docker
    # network: set VITE_API_URL=/api at build time and requests will be
    # proxied through here to the backend container instead.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
