name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run test suite
        working-directory: backend
        run: pytest -v --tb=short

      # Vendor fixture tests run as part of the suite above, but called out
      # separately here so a failure is immediately legible in the Actions UI
      # as "real-world capture regression" rather than buried in the general run.
      - name: Run vendor fixture regression tests
        working-directory: backend
        run: pytest -v app/tests/test_vendor_fixtures.py --tb=short

  frontend-build:
    name: Frontend build & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t voip-analyzer-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t voip-analyzer-frontend:ci ./frontend

      - name: Smoke test backend container
        run: |
          docker run -d --name backend-smoke -p 8000:8000 voip-analyzer-backend:ci
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker logs backend-smoke
          exit 1
